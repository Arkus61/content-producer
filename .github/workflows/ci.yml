name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          OPENAI_API_KEY: fake-key-for-testing
          SUPABASE_JWT_SECRET: test-secret-key-32bytes-long-key-superlong!!!!
          DATABASE_URL: sqlite+aiosqlite:///./test.db
        run: pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /root/content-producer
            git pull origin main
            source .env
            cp /root/.hermes/hermes-agent/venv/bin/activate /tmp/activate_tmp 2>/dev/null || true
            pip install -r requirements.txt
            sudo systemctl restart content-producer
            sleep 5
            curl -sf http://localhost:8000/health || echo "DEPLOY WARNING: health check failed"
